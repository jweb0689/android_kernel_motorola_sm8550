#LineageOS23.2 with KernelSU and Susfs
name: Build Android 13 (5.15) Kernel with KSU, SUSFS & Boot Repack

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel Repository URL'
        required: true
        default: 'https://github.com/your-username/your-kernel'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: 'main'
      device_defconfig:
        description: 'Defconfig Name (e.g., gki_defconfig)'
        required: true
        default: 'gki_defconfig'
      boot_image_url:
        description: 'Direct Download URL to your stock boot.img or init_boot.img'
        required: true
        default: 'https://link-to-your-stock-image.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Environment
        uses: actions/checkout@v4

      - name: Setup Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison ca-certificates curl flex gcc git libc6-dev libssl-dev openssl python3 unzip wget zip zstd
          
      - name: Download ZyC-Clang Toolchain (Android 13/5.15 Optimized)
        run: |
          git clone --depth=1 https://gitlab.com/zyc-compiler/zyc-clang.git clang

      - name: Download & Extract Magiskboot (Official)
        run: |
          echo "Extracting native magiskboot binary from official Magisk release..."
          wget https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
          unzip Magisk-v27.0.apk lib/x86_64/libmagiskboot.so
          mv lib/x86_64/libmagiskboot.so magiskboot
          chmod +x magiskboot

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_repo }} kernel_workspace

      - name: Integrate KernelSU & SUSFS
        working-directory: kernel_workspace
        run: |
          echo "Setting up KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          
          echo "Setting up SUSFS for Android 13 (5.15)..."
          git clone --depth=1 -b gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu
          
          echo "Patching KernelSU..."
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch
          cd ..
          
          echo "Copying SUSFS core files..."
          cp -r ../susfs4ksu/kernel_patches/fs/* fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          echo "Patching 5.15 Kernel..."
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-5.15.patch
          
          echo "Enabling flags in defconfig..."
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ github.event.inputs.device_defconfig }}
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/${{ github.event.inputs.device_defconfig }}

      - name: Build the 5.15 Kernel
        working-directory: kernel_workspace
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          
          make O=out ${{ github.event.inputs.device_defconfig }}
          make O=out -j$(nproc)

      - name: Package AnyKernel3 Zip
        run: |
          echo "Packaging via AnyKernel3..."
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp kernel_workspace/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../AnyKernel3-Android13-5.15-KSU-SUSFS.zip *

      - name: Repack Stock Boot Image with Magiskboot
        run: |
          echo "Downloading Stock Boot Image from user URL..."
          wget -O stock_boot.img "${{ github.event.inputs.boot_image_url }}"
          
          echo "Unpacking Stock Boot Image..."
          ./magiskboot unpack stock_boot.img
          
          echo "Replacing Kernel..."
          cp kernel_workspace/out/arch/arm64/boot/Image kernel
          
          echo "Repacking..."
          ./magiskboot repack stock_boot.img
          mv new-boot.img Patched-Boot-Image-KSU-SUSFS.img

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KSU-SUSFS-Kernel-Release
          path: |
            AnyKernel3-Android13-5.15-KSU-SUSFS.zip
            Patched-Boot-Image-KSU-SUSFS.img
